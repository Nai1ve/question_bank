spring:
  application:
    name: onepass-practice

server:
  port: 8080

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    issuer: onepass-practice
    secret: ${APP_JWT_SECRET:dev-only-jwt-secret-dev-only-jwt-secret}
    expiration-seconds: 604800
  topxx:
    default-limit: 20
    allowed-limits: 20,40,60,80,100
  practice:
    session-retention-days: 7
  wechat:
    app-id: ${WECHAT_MINI_APP_ID:replace-me}
    app-secret: ${WECHAT_MINI_APP_SECRET:replace-me}
  web:
    cors:
      allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  mock:
    enabled: ${APP_MOCK_ENABLED:true}
  import:
    storage-root: ${IMPORT_STORAGE_ROOT:import-storage}
    default-category-path: ${IMPORT_DEFAULT_CATEGORY_PATH:考研/政治/基础阶段}
    admin-token: ${APP_ADMIN_IMPORT_TOKEN:dev-admin-import-token}
